name: Build and Release

on:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    build-windows:
        name: Build Windows
        runs-on: windows-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Install Velopack Tool
              run: dotnet tool install -g vpk

            - name: Get Version (Strip v)
              id: version
              shell: pwsh
              run: |
                  $tag = "${{ github.event.release.tag_name }}"
                  $version = $tag.TrimStart('v')
                  if ($version -match '^(\d+\.\d+\.\d+)') {
                      $version = $Matches[1]
                  } else {
                      Write-Error "Release tag must be SemVer2 (e.g. v1.0.0), got: $tag"
                      exit 1
                  }
                  echo "VERSION=$version" >> $env:GITHUB_ENV
                  Write-Host "Building version: $version"

            - name: Publish App
              run: dotnet publish InventoryManagementSystem.Desktop/InventoryManagementSystem.Desktop.csproj -c Release -o ./publish

            - name: Pack Release (Velopack)
              run: vpk pack -u "InventoryManagementSystem" -v "${{ env.VERSION }}" -p ./publish -e "InventoryManagementSystem.Desktop.exe"

            - name: Upload Release Assets
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: Releases/*
                  token: ${{ secrets.GITHUB_TOKEN }}

    build-linux:
        name: Build Linux
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Install Velopack Tool
              run: dotnet tool install -g vpk

            - name: Get Version (Strip v)
              id: version
              run: |
                  TAG="${{ github.event.release.tag_name }}"
                  VERSION="${TAG#v}"
                  if [[ "$VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+) ]]; then
                      VERSION="${BASH_REMATCH[1]}"
                  else
                      echo "Release tag must be SemVer2 (e.g. v1.0.0), got: $TAG"
                      exit 1
                  fi
                  echo "VERSION=$VERSION" >> $GITHUB_ENV
                  echo "Building version: $VERSION"

            - name: Publish App
              run: dotnet publish InventoryManagementSystem.Desktop/InventoryManagementSystem.Desktop.csproj -c Release -o ./publish

            - name: Pack Release (Velopack)
              run: vpk pack -u "InventoryManagementSystem" -v "${{ env.VERSION }}" -p ./publish -e "InventoryManagementSystem.Desktop"

            - name: Upload Release Assets
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: Releases/*
                  token: ${{ secrets.GITHUB_TOKEN }}
